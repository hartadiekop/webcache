<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azalia AI - Medical Consultation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .blob { position: absolute; background: linear-gradient(45deg, #667eea, #764ba2); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; opacity: 0.1; animation: float 8s ease-in-out infinite; pointer-events: none; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px border rgba(255,255,255,0.1); }
        .chat-container { height: calc(100vh - 160px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-white overflow-hidden">
    <div id="doc-panel" class="fixed inset-y-0 right-0 w-full md:w-2/3 lg:w-1/2 glass border-l border-slate-800 shadow-2xl transform translate-x-full transition-transform duration-500 ease-in-out z-50">
    <div class="h-full flex flex-col">
        <div class="p-4 border-b border-slate-800 flex items-center justify-between bg-slate-900/50">
            <h2 class="font-bold text-cyan-400 flex items-center">
                <span class="mr-2">📄</span> Medical Report Analysis
            </h2>
            <button onclick="closePanel()" class="p-2 hover:bg-slate-800 rounded-lg transition text-slate-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div class="flex-1 bg-white">
            <iframe id="doc-frame" src="" class="w-full h-full border-none"></iframe>
        </div>
    </div>
</div>
<div id="panel-overlay" onclick="closePanel()" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-40"></div>
    <div class="blob w-96 h-96 top-10 left-10"></div>
    <div class="blob w-80 h-80 bottom-10 right-10"></div>

    <div class="max-w-5xl mx-auto h-screen flex flex-col p-4 md:p-6 relative z-10">
        <header class="flex items-center justify-between mb-6 glass p-4 rounded-2xl border border-slate-800">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center font-bold shadow-lg shadow-blue-500/20">A</div>
                <div>
                    <h1 class="font-bold text-lg leading-none">Azalia <span class="text-xs font-medium text-cyan-400 ml-2">v0.1.0</span></h1>
                    <p class="text-xs text-slate-400">Medical AI Framework</p>
                </div>
            </div>
            <a href="index.html" class="text-xs text-slate-400 hover:text-white transition">← Back to Lab</a>
        </header>

        <div id="chat-history" class="chat-container overflow-y-auto space-y-4 mb-4 pr-2">
            <div class="flex justify-start">
                <div class="max-w-[85%] glass p-4 rounded-2xl rounded-tl-none border border-slate-800 text-slate-200 text-sm leading-relaxed">
                    Halo Dokter, saya <b>Azalia</b>. Bagaimana saya bisa membantu asistensi klinis Anda hari ini?
                </div>
            </div>
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute -top-8 left-4 text-xs text-cyan-400 animate-pulse">Azalia sedang menganalisis literatur medis...</div>
            <div class="glass p-2 rounded-2xl border border-slate-800 flex items-center space-x-2 focus-within:border-blue-500/50 transition-all">
                <input id="user-input" type="text" placeholder="Tanyakan kasus klinis, dosis, atau jurnal..." class="bg-transparent flex-1 p-3 outline-none text-sm">
                <button id="send-btn" class="bg-gradient-to-r from-blue-600 to-purple-600 p-3 rounded-xl hover:scale-105 transition active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loading = document.getElementById('loading');

        // User ID Persistent (Sesuai diskusi UUID v4 sebelumnya)
        let userId = localStorage.getItem('azalia_uid') || crypto.randomUUID();
        localStorage.setItem('azalia_uid', userId);

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';
            loading.classList.remove('hidden');

            try {
                const response = await fetch('https://apivan.han.ovh/webhook/azalia-332293f6-96a8-45ff-aaf9-890c18ad07cc', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, userId })
                });

                const data = await response.json();
                handleResponse(data);
            } catch (error) {
                appendMessage('bot', 'Maaf Dok, terjadi kendala pada koneksi ke Hanovh Lab.');
            } finally {
                loading.classList.add('hidden');
            }
        }

        function handleResponse(data) {
            // Tampilkan pesan teks utama
            appendMessage('bot', data.message);

            // Jika ada Advance Detail (Tag Webpage)
            if (data.has_webpage && data.webpage_id) {
                appendWebpageButton(data.webpage_id);
            }
        }

        function appendMessage(sender, text) {
    const div = document.createElement('div');
    div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
    div.innerHTML = `
        <div class="max-w-[85%] p-4 rounded-2xl ${sender === 'user' 
            ? 'bg-blue-600 rounded-tr-none text-white' 
            : 'glass rounded-tl-none border border-slate-800 text-slate-200'} 
            text-sm leading-relaxed shadow-xl whitespace-pre-wrap"> ${text}
        </div>
    `;
    chatHistory.appendChild(div);
    chatHistory.scrollTop = chatHistory.scrollHeight;
}

        function appendWebpageButton(id) {
    const div = document.createElement('div');
    div.className = "flex justify-start mt-2";
    div.innerHTML = `
        <button onclick="openDoc('${id}')" 
                class="ml-2 px-4 py-2 bg-slate-900 border border-cyan-500/50 text-cyan-400 text-xs rounded-lg hover:bg-cyan-500/10 transition flex items-center space-x-2 shadow-lg">
            <span>📄 See Advanced Detail</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
        </button>
    `;
    chatHistory.appendChild(div);
    chatHistory.scrollTop = chatHistory.scrollHeight;
}
        
        // Fungsi untuk membuka panel
function openDoc(webpageId) {
    const panel = document.getElementById('doc-panel');
    const overlay = document.getElementById('panel-overlay');
    const frame = document.getElementById('doc-frame');
    
    // Set URL n8n renderer lo (sesuai diskusi iwp=ID)
    frame.src = `https://med.han.ovh/webdoc.html?iwp=${webpageId}`;
    
    panel.classList.remove('translate-x-full');
    overlay.classList.remove('hidden');
}
        
function closePanel() {
    const panel = document.getElementById('doc-panel');
    const overlay = document.getElementById('panel-overlay');
    panel.classList.add('translate-x-full');
    overlay.classList.add('hidden');
}

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
